<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operator Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef2ff;
      font-family: Arial, sans-serif;
      color: #1e293b;
    }

    .card {
      width: min(420px, calc(100vw - 24px));
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(30, 41, 59, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0 0 16px;
      color: #64748b;
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      margin: 10px 0 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    ul {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fee2e2;
      color: #991b1b;
      font-size: 13px;
    }

    #togglePasswordBtn {
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      width: auto;
      color: #64748b;
      cursor: pointer;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }
    #togglePasswordBtn:hover {
      color: #1e293b;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Operator Login</h1>
    <p>Sign in once before supervised kiosk voting begins.</p>

    {% if form.errors %}
    <ul>
      <li>Invalid username or password.</li>
    </ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" required autofocus />

      <label for="id_password">Password</label>
      <div style="position: relative;">
        <input type="password" name="password" id="id_password" required style="padding-right: 40px;" />
        <button type="button" id="togglePasswordBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>

      <button type="submit">Login</button>
    </form>
  </div>

  <script>
    const passwordInput = document.getElementById('id_password');
    const toggleBtn = document.getElementById('togglePasswordBtn');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      
      if (isPassword) {
        // Show slash-eye icon
        eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        // Show normal eye icon
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    });
  </script>
</body>

</html>
